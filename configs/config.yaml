# ============================================================
# Central config — change hyperparameters here, not in code
# ============================================================

data:
  raw_dir:       "data/raw"
  processed_dir: "data/processed"
  sampling_rate: 256              # CHB-MIT recorded at 256 Hz — do not change
  num_channels:  23               # Standard CHB-MIT channel count
  window_size_sec: 5              # 5s × 256Hz = 1280 samples per window
  stride_sec: 2.5                 # 2.5 → 50% overlap  |  5.0 → non-overlapping
  seizure_overlap_threshold: 0.5  # Fraction of window that must overlap a seizure to label it 1

  # ── Patient-level split (scientifically correct — no data leakage) ──────────
  # Train on patients 1-16, validate on 17-19, test on 20-24.
  # The model is evaluated on patients it has NEVER seen during training.
  # Change n_train_patients for learning curve experiments (see scripts/learning_curve.py).
  train_patients: ["chb01","chb02","chb03","chb04","chb05","chb06","chb07","chb08",
                   "chb09","chb10","chb11","chb12","chb13","chb14","chb15","chb16"]
  val_patients:   ["chb17","chb18","chb19"]
  test_patients:  ["chb20","chb21","chb22","chb23","chb24"]
  n_train_patients: 16            # Use first N train_patients. Change for learning curve runs.
                                  # e.g. 4, 8, 12, 16

training:
  batch_size: 64                  # Lower to 32 if CUDA out of memory
  epochs: 50                      # Start with 30, increase if val F1 is still rising
  learning_rate: 0.001            # Try 3e-4 or 5e-4 if loss stalls early
  weight_decay: 0.0001            # L2 regularization — increase to 1e-3 if overfitting
  early_stopping_patience: 10     # Stop if val F1 doesn't improve for N epochs
  monitor_metric: "f1"            # "f1" or "recall" — use "recall" to maximize seizure catch rate
  grad_clip: 1.0                  # Critical for LSTM/GRU — prevents exploding gradients
  num_workers: 4                  # Match your CPU core count
  mixed_precision: true           # Faster training on NVIDIA GPU — set false if NaN loss

cnn_baseline:
  out_channels: [32, 64, 128]     # Filters per conv layer. Try [64,128,256] for more capacity.
  kernel_size: 5                  # Temporal filter width. Larger = wider local context.
  dropout: 0.3                    # Increase to 0.5 if val metrics lag behind train metrics.

cnn_lstm:
  out_channels: [32, 64, 128]
  kernel_size: 5
  lstm_hidden: 128                # Try 256 for more capacity, 64 for faster training.
  lstm_layers: 2                  # 1 is often enough; 3+ rarely helps on 5s windows.
  bidirectional: false            # true → sees future context (better offline, not real-time)
  dropout: 0.3

cnn_gru:
  out_channels: [32, 64, 128]
  kernel_size: 5
  gru_hidden: 128
  gru_layers: 2
  bidirectional: false
  dropout: 0.3

tcn:
  num_channels: [64, 64, 64, 64]  # One entry per residual block. Add more to grow receptive field.
  kernel_size: 3                  # Try 5 or 7 for faster receptive field growth per block.
  dropout: 0.2                    # TCN is less prone to overfit; keep lower than LSTM.

evaluation:
  threshold: 0.5                  # Lower (e.g. 0.3) = higher recall, more false alarms.
                                  # Use threshold_sweep plot to find your optimal value.

paths:
  checkpoints: "checkpoints/"
  logs:        "logs/"
  results:     "results/"
